# 生产环境 Docker Compose
# 只需要一个配置文件: deploy.env
#
# 部署步骤:
#   1. 修改 deploy.env
#   2. docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ========== Portal API ==========
  portal-api:
    build:
      context: ./portal/server
      dockerfile: Dockerfile
    container_name: portal-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./deploy.env
    volumes:
      - ./data/skills_storage:/app/skills_storage
      - ./data/outputs:/app/outputs
      - ./data/uploads:/app/uploads
    networks:
      - app-network

  # ========== Admin API ==========
  admin-api:
    build:
      context: ./admin/server
      dockerfile: Dockerfile
    container_name: admin-api
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - ./deploy.env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
