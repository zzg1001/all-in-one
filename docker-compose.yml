version: '3.8'

services:
  # ========== Frontend - Portal (用户端) ==========
  portal-web:
    build:
      context: ./frontend/portal
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=${API_URL:-http://localhost:8001/api}
    networks:
      - app-network
    profiles:
      - frontend

  # ========== Frontend - Admin (管理端) ==========
  admin-web:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=${API_URL:-http://localhost:8001/api}
    networks:
      - app-network
    profiles:
      - frontend

  # ========== 数据库 ==========
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-ai_agent}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Backend (统一后端) ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - app-network
    env_file:
      - ./deploy.env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/skills_storage:/app/skills_storage
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/file_manage:/app/file_manage
      - ./logs:/app/logs

  # ========== Nginx 网关 (可选) ==========
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - portal-web
      - admin-web
      - backend
    networks:
      - app-network
    profiles:
      - gateway

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
