# AI Skills Platform - 生产环境 Nginx 配置
# 域名: infortest.ike-data.com
# 端口: 80

server {
    listen 80;
    server_name infortest.ike-data.com;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # ---------- 首页 ----------
    location / {
        root /var/www/frontend-home/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # ---------- Portal 用户端前端 ----------
    location /portal/ {
        alias /var/www/portal/web/dist/;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
    }

    # ---------- Admin 管理端前端 ----------
    location /admin/ {
        alias /var/www/admin/web/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ---------- Portal API ----------
    location /portal-api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- Admin API ----------
    location /admin-api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------- 静态文件输出 ----------
    location /outputs/ {
        proxy_pass http://127.0.0.1:8000/outputs/;
        proxy_set_header Host $host;
    }

    # ---------- 上传文件 ----------
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_set_header Host $host;
    }

    # ---------- 健康检查 ----------
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # ---------- 错误页面 ----------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
